<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Membership Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar compact">
    <h1>Membership Module</h1>
    <a class="btn ghost" id="dashboardLink" href="#">Dashboard</a>
  </header>

  <nav class="nav-links" id="appNav"></nav>

  <main class="page-grid">
    <section class="card">
      <h2>Add Membership</h2>
      <form id="addMembershipForm" class="form-grid">
        <label>Member Name</label>
        <input id="member_name" type="text" minlength="2" maxlength="120" required />

        <label>Email</label>
        <input id="email" type="email" required />

        <label>Phone</label>
        <input id="phone" type="text" minlength="8" maxlength="20" required />

        <label>Duration</label>
        <div class="radio-group" role="radiogroup" aria-label="Membership duration">
          <label class="radio-option"><input type="radio" name="duration" value="6 months" checked />6 months</label>
          <label class="radio-option"><input type="radio" name="duration" value="1 year" />1 year</label>
          <label class="radio-option"><input type="radio" name="duration" value="2 years" />2 years</label>
        </div>

        <label>Start Date</label>
        <input id="start_date" type="date" required />

        <label>Status</label>
        <select id="status">
          <option value="active">active</option>
          <option value="inactive">inactive</option>
          <option value="suspended">suspended</option>
        </select>

        <button class="btn primary" type="submit">Add Membership</button>
        <p id="addMembershipMessage" class="form-message"></p>
      </form>

      <hr class="section-divider" />

      <h2>Update Membership</h2>
      <form id="updateMembershipForm" class="form-grid">
        <label>Membership ID (Required)</label>
        <div class="inline-row">
          <input id="membershipLookupId" type="number" min="1" required />
          <button class="btn ghost" id="loadMembershipBtn" type="button">Load</button>
        </div>

        <div id="membershipPreview" class="info-box"></div>

        <label>Update Action</label>
        <div class="radio-group" role="radiogroup" aria-label="Membership update action">
          <label class="radio-option"><input type="radio" name="update_action" value="extend" checked />Extend membership</label>
          <label class="radio-option"><input type="radio" name="update_action" value="cancel" />Cancel membership</label>
        </div>

        <label>Extension Duration</label>
        <div class="radio-group" role="radiogroup" aria-label="Extension duration">
          <label class="radio-option"><input type="radio" name="extension_duration" value="6 months" checked />6 months</label>
          <label class="radio-option"><input type="radio" name="extension_duration" value="1 year" />1 year</label>
          <label class="radio-option"><input type="radio" name="extension_duration" value="2 years" />2 years</label>
        </div>

        <button class="btn primary" type="submit">Update Membership</button>
        <p id="updateMembershipMessage" class="form-message"></p>
      </form>
    </section>

    <section class="card">
      <h2>Membership List</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Duration</th><th>End Date</th><th>Status</th><th>Action</th></tr></thead>
          <tbody id="membershipTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/membership.js"></script>
</body>
</html>
