<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Membership Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar compact">
    <h1>Membership Module</h1>
    <a class="btn ghost" id="dashboardLink" href="#">Dashboard</a>
  </header>

  <main class="page-grid">
    <section class="card">
      <h2>Add / Update Membership</h2>
      <form id="membershipForm" class="form-grid">
        <input type="hidden" id="membershipId" />
        <label>Member Name</label>
        <input id="member_name" type="text" minlength="2" maxlength="120" required />

        <label>Email</label>
        <input id="email" type="email" required />

        <label>Phone</label>
        <input id="phone" type="text" minlength="8" maxlength="20" required />

        <label>Membership Type</label>
        <input id="membership_type" type="text" minlength="3" maxlength="40" required />

        <label>Start Date</label>
        <input id="start_date" type="date" required />

        <label>End Date</label>
        <input id="end_date" type="date" required />

        <label>Status</label>
        <select id="status">
          <option value="active">active</option>
          <option value="inactive">inactive</option>
          <option value="suspended">suspended</option>
        </select>

        <button class="btn primary" type="submit">Save Membership</button>
        <p id="membershipMessage" class="form-message"></p>
      </form>
    </section>

    <section class="card">
      <h2>Membership List</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Type</th><th>Status</th><th>Action</th></tr></thead>
          <tbody id="membershipTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/membership.js"></script>
</body>
</html>
