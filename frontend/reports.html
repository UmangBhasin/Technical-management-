<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar compact">
    <h1>Reports Module</h1>
    <a class="btn ghost" id="dashboardLink" href="#">Dashboard</a>
  </header>

  <nav class="nav-links" id="appNav"></nav>

  <main class="page-grid single-col">
    <section class="card">
      <div class="report-head">
        <h2>User Report</h2>
        <button class="btn ghost" id="exportUsersCsvBtn" type="button">Export CSV</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Created At</th></tr></thead>
          <tbody id="userReportTable"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="report-head">
        <h2>Membership Report</h2>
        <button class="btn ghost" id="exportMembershipCsvBtn" type="button">Export CSV</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>Member</th><th>Email</th><th>Duration</th><th>Start</th><th>End</th><th>Status</th></tr></thead>
          <tbody id="membershipReportTable"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <div class="report-head">
        <h2>Transaction Report</h2>
        <button class="btn ghost" id="exportTransactionCsvBtn" type="button">Export CSV</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>User</th><th>Member</th><th>Amount</th><th>Type</th><th>Date</th></tr></thead>
          <tbody id="transactionReportTable"></tbody>
        </table>
      </div>
      <p id="reportsMessage" class="form-message"></p>
    </section>

    <section class="card" id="charts">
      <div class="report-head">
        <h2>Charts</h2>
      </div>
      <div id="chartContainer" class="chart-list"></div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/reports.js"></script>
</body>
</html>
