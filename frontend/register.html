<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Event Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="auth-shell">
    <form id="registerForm" class="auth-card">
      <h1>Create Account</h1>
      <p class="subtext">Start managing your event operations.</p>

      <label>Full Name</label>
      <input id="fullName" type="text" required minlength="2" maxlength="100" placeholder="Your name" />

      <label>Email</label>
      <input id="email" type="email" required placeholder="you@example.com" />

      <label>Password</label>
      <input id="password" type="password" minlength="8" required placeholder="Minimum 8 characters" />

      <label>Confirm Password</label>
      <input id="confirmPassword" type="password" minlength="8" required placeholder="Repeat password" />

      <button class="btn primary" type="submit">Register</button>
      <p id="formMessage" class="form-message"></p>
      <p class="switch-link">Already have an account? <a href="login.html">Login</a></p>
    </form>
  </main>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
