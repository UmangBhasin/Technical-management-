<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Event Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="auth-shell">
    <form id="loginForm" class="auth-card">
      <h1>Sign In</h1>
      <p class="subtext">Access your dashboard securely.</p>

      <label>Email</label>
      <input id="email" type="email" required placeholder="you@example.com" />

      <label>Password</label>
      <input id="password" type="password" minlength="8" required placeholder="Minimum 8 characters" />

      <button class="btn primary" type="submit">Login</button>
      <p id="formMessage" class="form-message"></p>
      <p class="switch-link">No account? <a href="register.html">Register here</a></p>
    </form>
  </main>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
